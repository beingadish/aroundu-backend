apiVersion: apps/v1
kind: Deployment
metadata:
  name: aroundu-app
  namespace: aroundu
  labels:
    app.kubernetes.io/name: aroundu-app
    app.kubernetes.io/part-of: aroundu
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aroundu-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aroundu-app
        app.kubernetes.io/part-of: aroundu
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # ── Init containers: wait for dependencies ──────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready."
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z redis-service 6379; do
                sleep 2
              done
              echo "Redis is ready."

      # ── Application container ───────────────────────────────
      containers:
        - name: aroundu-app
          image: aroundu-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aroundu-config
          env:
            - name: PROD_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: PROD_DB_USERNAME
            - name: PROD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: PROD_DB_PASSWORD
            - name: PROD_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: PROD_REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: JWT_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: ADMIN_NAME
            - name: PAYLOAD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: aroundu-secrets
                  key: PAYLOAD_ENCRYPTION_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi

          # StartupProbe — covers slow Spring Boot cold starts (up to 5 min)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          # ReadinessProbe — only route traffic when healthy
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # LivenessProbe — restart if unresponsive
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: app-logs
              mountPath: /app/logs

      volumes:
        - name: app-logs
          emptyDir: {}
