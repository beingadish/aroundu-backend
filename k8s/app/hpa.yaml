apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aroundu-app-hpa
  namespace: aroundu
  labels:
    app.kubernetes.io/name: aroundu-app
    app.kubernetes.io/part-of: aroundu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aroundu-app
  minReplicas: 1
  maxReplicas: 10 # Increased for high-load stress testing (20000+ RPS)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # Immediate scale-up for stress testing
      policies:
        - type: Pods
          value: 4 # Scale up to 4 pods at once
          periodSeconds: 15
        - type: Percent
          value: 100 # Double pods
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
