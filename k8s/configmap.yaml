apiVersion: v1
kind: ConfigMap
metadata:
  name: aroundu-config
  namespace: aroundu
  labels:
    app.kubernetes.io/part-of: aroundu
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  PROD_DB_URL: "jdbc:postgresql://postgres-service:5432/aroundu"
  PROD_REDIS_HOST: "redis-service"
  PROD_REDIS_PORT: "6379"
  JWT_EXPIRATION_MS: "172800000"
  JWT_REFRESH_EXPIRATION_MS: "2592000000"
  FEATURE_ENABLE_SWAGGER: "false"
  FEATURE_ENABLE_DUMMY_DATA: "false"
  FEATURE_ENABLE_DEBUG_SECURITY: "false"
