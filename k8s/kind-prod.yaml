# KIND Cluster config — prod-like: 1 control-plane + 9 workers
# Creates "aroundu-prod" cluster
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: aroundu-prod
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6445

nodes:
  # ── Control Plane ─────────────────────────────────────────
  - role: control-plane
    labels:
      node-type: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8880
        protocol: TCP
      - containerPort: 443
        hostPort: 8843
        protocol: TCP
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP

  # ── Worker Nodes (9) ──────────────────────────────────────
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-b
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-b
  - role: worker
    labels:
      node-type: app
      topology.kubernetes.io/zone: zone-b
  - role: worker
    labels:
      node-type: infra
      topology.kubernetes.io/zone: zone-c
  - role: worker
    labels:
      node-type: infra
      topology.kubernetes.io/zone: zone-c
  - role: worker
    labels:
      node-type: monitoring
      topology.kubernetes.io/zone: zone-c
