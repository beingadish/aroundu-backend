apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: aroundu
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: aroundu
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: "AroundU"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
