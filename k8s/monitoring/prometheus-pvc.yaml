apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: aroundu
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: aroundu
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
