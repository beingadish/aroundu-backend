apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aroundu
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: aroundu
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "aroundu-backend"
        metrics_path: "/actuator/prometheus"
        scrape_interval: 10s
        static_configs:
          - targets: ["app-service:8080"]
            labels:
              application: "AroundU"
              environment: "prod"

      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
