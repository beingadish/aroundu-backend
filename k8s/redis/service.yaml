apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: aroundu
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: aroundu
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
