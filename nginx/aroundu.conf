# AroundU production Nginx config
# Deploy: sudo cp aroundu-backend/nginx/aroundu.conf /etc/nginx/sites-available/aroundu
#         sudo ln -sf /etc/nginx/sites-available/aroundu /etc/nginx/sites-enabled/aroundu
#         sudo nginx -t && sudo systemctl reload nginx

upstream aroundu_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;           # Replace with your domain if applicable

    # ── Regular HTTP API ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://aroundu_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep connections alive to the upstream
        proxy_set_header   Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket (STOMP over WS) ─────────────────────────────────────────────
    # Must come BEFORE the '/' block so the more specific prefix wins.
    location /ws/ {
        proxy_pass         http://aroundu_backend;
        proxy_http_version 1.1;

        # These two headers are REQUIRED for the HTTP→WebSocket upgrade.
        # Without them Nginx drops the Upgrade header and Spring sees
        # "Handshake failed due to invalid Upgrade header: null".
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket connections stay open; set a long read timeout so idle
        # connections are not dropped mid-session.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
